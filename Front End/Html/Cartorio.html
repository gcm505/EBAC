    <header>
        <h1>Cartorio Ebac</h1>

            <ul>

                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Registro de Nome</h2>
            <form>
                <label for="">Nome: </label>
                <input type="text">
                <label for="">Sobrenome: </label>
                <input type="text">
                <label for="">Cargo: </label>
                <input type="text">
                <label for="">CPF: </label>
                <input type="number">
                <button type="submit">Registrar</button>
            </form>
        </section>

        <section>
            <h2>Consulta</h2>
            <form>
                <label for="">CPF: </label>
                <input type="number">
                <button type="submit">Consultar</button>
            </form>
        </section>

        <section>
            <h2>Deletar</h2>
            <form>
                <label for="">CPF: </label>
                <input type="number">
                <button type="submit">Deletar</button>
            </form>
        </section>
