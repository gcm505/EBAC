<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Jogo de Adivinhação
    </title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>

<body>
    <header>
        <h1>Jogo de Adivinhação</h1>
    </header>

    <main>
        <section>
            <h3>Instruções</h3>
            <p>Bem-vindo ao Jogo de Adivinhação! O objetivo do jogo é adivinhar um número aleatório entre 1 e 100. Você terá dez tentativas para acertar o número correto. Boa sorte!</p>
        </section>

        <section>
            <h3>Jogar</h3>
            <input type="number" id="chute" placeholder="Digite seu palpite">
            <button onclick="checkGuess()">Chutar</button>
            <p id="feedback"></p>
            <p id="tentativas"></p>
            
        </section>
    </main>
    
</body>
